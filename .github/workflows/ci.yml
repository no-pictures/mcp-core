name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: gronke/rust-ci/.github/actions/install-toolchain@v0.0.4
        with:
          components: rustfmt clippy

      # Replaces the hand-rolled restore/save pair; incremental compilation defaults off in CI.
      - name: Cache cargo
        uses: gronke/rust-ci/.github/actions/rust-cache@v0.0.4
        with:
          prefix: test
          cache-target: "true"

      - name: Lint and test (all features)
        uses: gronke/rust-ci/.github/actions/lint-and-test@v0.0.4
        with:
          features: "--all-features"

      # A second feature universe: the crate's point is slim opt-in graphs, so the bare build
      # must stay green too. fmt is universe-independent and already ran above.
      - name: Lint and test (no default features)
        uses: gronke/rust-ci/.github/actions/lint-and-test@v0.0.4
        with:
          features: "--no-default-features"
          fmt: "false"

      # cargo test --all-features runs the ts-export test, regenerating web/src/shell/generated/.
      # A diff here means the Rust wire types drifted from the committed TypeScript bindings.
      - name: Check generated TS bindings are in sync
        run: git diff --exit-code -- web/src/shell/generated

  features:
    name: Feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: gronke/rust-ci/.github/actions/install-toolchain@v0.0.4

      - name: Cache cargo
        uses: gronke/rust-ci/.github/actions/rust-cache@v0.0.4
        with:
          prefix: features

      # Prebuilt release binary: the org Actions allowlist admits only selected actions
      # (github-owned, cargo-deny-action, reuse-action, gronke/*), so no taiki-e installer.
      - name: Install cargo-hack
        run: curl -sL https://github.com/taiki-e/cargo-hack/releases/latest/download/cargo-hack-x86_64-unknown-linux-gnu.tar.gz | tar xz -C "$HOME/.cargo/bin"

      # The crate's value proposition is slim per-feature dependency graphs; building every
      # feature in isolation catches missing #[cfg] gates that --all-features unification hides.
      - name: Check each feature in isolation
        run: cargo hack check --each-feature --no-dev-deps

  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Advisories, license allowlist, and registry/git sources, per deny.toml.
      - uses: EmbarkStudios/cargo-deny-action@v2

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: fsfe/reuse-action@v6

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting, lint, and types
        run: npm run check

      - name: Run unit tests
        run: npm run test:unit

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: gronke/rust-ci/.github/actions/install-toolchain@v0.0.4

      - name: Cache cargo
        uses: gronke/rust-ci/.github/actions/rust-cache@v0.0.4
        with:
          prefix: e2e
          cache-target: "true"

      - name: Build the example MCP server
        run: cargo build -p mcp-ui-demo

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run browser end-to-end tests
        working-directory: web
        run: npm run test:e2e
