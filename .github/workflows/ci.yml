name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: gronke/rust-ci/.github/actions/install-toolchain@v0.0.4
        with:
          components: rustfmt clippy

      # Replaces the hand-rolled restore/save pair; incremental compilation defaults off in CI.
      - name: Cache cargo
        uses: gronke/rust-ci/.github/actions/rust-cache@v0.0.4
        with:
          prefix: test
          cache-target: "true"

      - name: Lint and test (all features)
        uses: gronke/rust-ci/.github/actions/lint-and-test@v0.0.4
        with:
          features: "--all-features"

      # A second feature universe: the crate's point is slim opt-in graphs, so the bare build
      # must stay green too. fmt is universe-independent and already ran above.
      - name: Lint and test (no default features)
        uses: gronke/rust-ci/.github/actions/lint-and-test@v0.0.4
        with:
          features: "--no-default-features"
          fmt: "false"

      # cargo test --all-features runs the ts-export test, regenerating web/src/shell/generated/.
      # A diff here means the Rust wire types drifted from the committed TypeScript bindings.
      - name: Check generated TS bindings are in sync
        run: git diff --exit-code -- web/src/shell/generated

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting, lint, and types
        run: npm run check

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: gronke/rust-ci/.github/actions/install-toolchain@v0.0.4

      - name: Cache cargo
        uses: gronke/rust-ci/.github/actions/rust-cache@v0.0.4
        with:
          prefix: e2e
          cache-target: "true"

      - name: Build the example MCP server
        run: cargo build -p mcp-ui-demo

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run browser end-to-end tests
        working-directory: web
        run: npm run test:e2e
