# deny.toml — cargo-deny configuration: security advisories, license policy, dependency
# hygiene for the full feature graph. Run locally with `cargo deny check`; CI runs it on
# every push. See https://embarkstudios.github.io/cargo-deny/ for the schema.

[graph]
# Audit the complete graph: every feature a consumer could enable.
all-features = true

[advisories]
# RUSTSEC advisories fail the check; unmaintained transitive crates only warn.
unmaintained = "workspace"

[licenses]
# The workspace crates themselves are AGPL-3.0-or-later and unpublished.
private = { ignore = true }
# Permissive licenses of the dependency tree, all AGPL-compatible.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
